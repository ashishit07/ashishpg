<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ashish PG House</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      line-height: 1.6;
    }

    /* Banner Section */
    .banner {
      height: 100vh;
      background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
                  url('https://images.unsplash.com/photo-1560448204-e02f11c3d0e2');
      background-size: cover;
      background-position: center;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: white;
      flex-direction: column;
      padding: 20px;
    }

    .banner h1 {
      font-size: 48px;
      margin-bottom: 15px;
    }

    .banner p {
      font-size: 20px;
      margin-bottom: 25px;
    }

    .btn {
      padding: 15px 30px;
      background: #ff6600;
      color: white;
      text-decoration: none;
      font-size: 18px;
      border-radius: 5px;
      transition: 0.3s;
    }

    .btn:hover {
      background: #e65c00;
    }

    /* Features Section */
    .features {
      padding: 50px 20px;
      text-align: center;
    }

    .features h2 {
      margin-bottom: 20px;
    }

    .features p {
      max-width: 600px;
      margin: auto;
      color: #555;
    }

    /* Footer */
    footer {
      background: #222;
      color: white;
      text-align: center;
      padding: 20px;
    }

    footer a {
      color: #ff6600;
      text-decoration: none;
      font-weight: bold;
    }

  </style>
</head>
<body>

  <!-- Banner -->
  <section class="banner">
    <h1>Ashish PG House</h1>
    <p>Comfortable & Affordable Stay</p>
    <a href="tel:9479825866" class="btn">Call Now: 9479825866</a>
  </section>

  <!-- Features -->
  <section class="features">
    <h2>Why Choose Us?</h2>
    <p>
      Safe, clean, and comfortable PG accommodation with all basic facilities.
      Perfect for students and working professionals.
    </p>
  </section>

  <!-- Footer -->
  <footer>
    <p>Contact Now: <a href="tel:9479825866">9479825866</a></p>
  </footer>

</body>
</html>
